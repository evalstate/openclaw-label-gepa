[project]
name = "openclaw-gepa"
version = "0.1.0"
description = "fast-agent + GEPA + Trackio optimization scaffold"
readme = "README.md"
requires-python = ">=3.13.5,<3.15"
dependencies = [
  "fast-agent-mcp[gepa]>=0.7.18",
]

[project.scripts]
openclaw-benchmark = "openclaw_gepa.openclaw_benchmark:main"

[tool.uv]
package = true

[tool.ruff]
line-length = 120
src = ["src", "scripts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
