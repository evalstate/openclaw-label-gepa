[project]
name = "openclaw-gepa"
version = "0.1.0"
description = "fast-agent + GEPA + Trackio optimization scaffold"
readme = "README.md"
requires-python = ">=3.13.5,<3.15"
dependencies = [
  "fast-agent-mcp[gepa]",
]

[project.scripts]
openclaw-gepa = "openclaw_gepa.cli:main"
openclaw-benchmark = "openclaw_gepa.openclaw_benchmark:main"
openclaw-gepa-run = "openclaw_gepa.openclaw_gepa_run:main"

[tool.uv]
package = true


[tool.uv.sources]
# Local dev branch (dev/0.7.18) for the RowWise GEPA adapter and trackio batch
# monitoring; the [gepa] extra pulls gepa@feat/trackio + trackio>=0.26.0.
# When fast-agent-mcp >= 0.7.17 lands on PyPI, delete this source override.
fast-agent-mcp = { path = "/home/ssmith/source/fast-agent-pr", editable = true }

[tool.ruff]
line-length = 120
src = ["src", "scripts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
