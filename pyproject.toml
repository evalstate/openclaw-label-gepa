[project]
name = "openclaw-gepa"
version = "0.1.0"
description = "fast-agent + GEPA + Trackio optimization scaffold"
readme = "README.md"
requires-python = ">=3.13.5,<3.15"
dependencies = [
  "fast-agent-mcp[gepa]>=0.7.18",
]

[project.scripts]
openclaw-benchmark = "openclaw_gepa.openclaw_benchmark:main"

[tool.uv]
package = true

[tool.uv.sources]
# Local dev/0.7.18 checkout until fast-agent-mcp 0.7.18 is on PyPI; delete
# this override on release (the >=0.7.18 pin above then resolves from PyPI).
fast-agent-mcp = { path = "/home/ssmith/source/fast-agent-pr", editable = true }

[tool.ruff]
line-length = 120
src = ["src", "scripts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
