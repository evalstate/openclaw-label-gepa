name: v7a
description: Plain-label promoted v6p soft-exact row-wise GEPA regime.

dataset:
  local_bundle: data
  hf_repo_id: null

default_variant: plain
label_order: prompts/allowed-topics-v7a.md
base_prompt: prompts/vanilla-labeler-plain-v7a.md
task_template: prompts/task-template-v7a.md
agent_cards:
  structured: prompts/vanilla-labeler-v7a.md
  plain: prompts/vanilla-labeler-plain-v7a.md
schema: schemas/teacher-output-v7a.schema.json
reflection_agent: openclaw_gepa_reflector
seed_policy: prompts/seed-policy-vanilla-v7a.md
boundary_guidance: prompts/topic-boundary-guidance-v7a.md
static_asi: prompts/vanilla-asi-v7a-slim.md
train_split: data/feedback300.jsonl
feedback_split: data/feedback300.jsonl
pareto_split: data/pareto60.jsonl
benchmark_split: data/bench78.jsonl
split_manifest: data/split-manifest.json
metric: row_soft_exact
score_mode: row-soft-exact

score_formula:
  gepa_score: "0.60 * row_jaccard + 0.20 * row_topic_f1 + 0.20 * row_exact"
  frontier_objectives:
    - gepa_score
    - row_jaccard
    - row_topic_f1
    - row_exact

trackio:
  project: easy-v7a-plain-gepa
  group: v7a
  step_metric: gepa/iteration
  local_dir: runs/v7a/trackio

run_defaults:
  run_root: runs/v7a/gepa
  run_name_template: "{model_slug}-{regime}-soft-exact-{variant}-{feedback_profile}-mb{reflection_minibatch_size}-mc{max_metric_calls}-{run_index:03d}"
  gepa_mode: row-wise
  feedback_profile: compact
  reflection_minibatch_size: 15
  frontier_type: hybrid
  candidate_selection_strategy: pareto
  acceptance_criterion: strict_improvement
  max_metric_calls: 1400
  hygiene_penalty: 0.03
  policy_char_budget: 12500
  parallel: 4

models:
  default_task: responses.gpt-5.5?reasoning=high
  default_reflection: codexresponses.gpt-5.5?reasoning=high
  supported:
    - responses.gpt-5.5?reasoning=high
    - codexresponses.gpt-5.4-mini
    - gemma-e4

artifacts:
  regime_doc: docs/V7A_REGIME.md
  feedback_sha256: 3d5b6a09222b4321ca9036f2d75720edf09435893c068d909352b17849cd0a5e
  pareto_sha256: dcd0d5a06ddcd27f6ea62a52021d5ffdb59a2fad85cdf9e9c846156f5c4b398f
  bench_sha256: d84af041233e89104d8eba3ad3a6dbb43a47b0fdcbde632a13cbe94c92152f32

notes:
  - Data is intentionally identical to v6p; v7a promotes the plain-label protocol as the default.
  - The optimization score is softer than v6o; held-out reporting should still include strict row-exact and row-Jaccard.
  - Trackio dashboards should use gepa/iteration as the x-axis.
