name: v6o
description: Strict Jaccard/exact row-wise GEPA regime with clean v6o artifacts.

dataset:
  local_bundle: data
  hf_repo_id: null

label_order: prompts/allowed-topics-v6h.md
base_prompt: prompts/openclaw-vanilla-labeler-v6o.md
task_template: prompts/task-template-v6o.md
agent_cards:
  structured: prompts/openclaw-vanilla-labeler-v6o.md
  plain: prompts/openclaw-vanilla-labeler-plain-v6o.md
schema: schemas/teacher-output-v6h.schema.json
seed_policy: prompts/seed-policy-vanilla-v6o.md
boundary_guidance: prompts/topic-boundary-guidance-v6h.md
static_asi: prompts/vanilla-asi-v6o-slim.md
train_split: data/feedback300.jsonl
feedback_split: data/feedback300.jsonl
pareto_split: data/pareto60.jsonl
benchmark_split: data/bench78.jsonl
split_manifest: data/split-manifest.json
metric: row_jaccard_exact
score_mode: row-jaccard-exact

score_formula:
  gepa_score: "0.70 * row_jaccard + 0.30 * row_exact"
  frontier_objectives:
    - gepa_score
    - row_jaccard
    - row_exact

trackio:
  project: easy-v6o-jaccard-gepa
  group: v6o
  step_metric: gepa/iteration
  local_dir: .trackio/v6o

run_defaults:
  run_root: runs/v6o/gepa
  run_name_template: "{model_slug}-{regime}-jaccard-exact-{variant}-{feedback_profile}-mb{reflection_minibatch_size}-mc{max_metric_calls}-{run_index:03d}"
  gepa_mode: row-wise
  feedback_profile: compact
  reflection_minibatch_size: 15
  frontier_type: hybrid
  candidate_selection_strategy: pareto
  acceptance_criterion: strict_improvement
  max_metric_calls: 2600
  hygiene_penalty: 0.03
  policy_char_budget: 12500
  parallel: 4

models:
  default_task: codexresponses.gpt-5.4-mini
  default_reflection: codexresponses.gpt-5.5?reasoning=high
  supported:
    - codexresponses.gpt-5.4-mini
    - gemma-e4

artifacts:
  regime_doc: docs/V6O_REGIME.md
  feedback_sha256: 3d5b6a09222b4321ca9036f2d75720edf09435893c068d909352b17849cd0a5e
  pareto_sha256: dcd0d5a06ddcd27f6ea62a52021d5ffdb59a2fad85cdf9e9c846156f5c4b398f
  bench_sha256: d84af041233e89104d8eba3ad3a6dbb43a47b0fdcbde632a13cbe94c92152f32

notes:
  - Feedback has 300 rows, zero overlap with Pareto and bench, and all 33 labels covered.
  - Reflection minibatch size 15 gives exactly 20 minibatches per epoch.
  - Trackio dashboards should use gepa/iteration as the x-axis.
