name: v7c-custom-proposer
description: Structured soft-exact regime using the generator-prompt seed with an OpenClaw custom candidate proposer.

dataset:
  local_bundle: data
  hf_repo_id: null

default_variant: structured
label_order: prompts/allowed-topics-v6h.md
base_prompt: prompts/openclaw-vanilla-labeler-v7c-custom-proposer.md
task_template: prompts/task-template-v7c-custom-proposer.md
agent_cards:
  structured: prompts/openclaw-vanilla-labeler-v7c-custom-proposer.md
  plain: prompts/openclaw-vanilla-labeler-plain-v7c-custom-proposer.md
schema: schemas/teacher-output-v7a.schema.json
reflection_agent: openclaw_gepa_reflector
seed_policy: prompts/seed-policy-vanilla-v7c-custom-proposer.md
boundary_guidance: prompts/topic-boundary-guidance-v6h.md
static_asi: prompts/vanilla-asi-v7c-custom-proposer-slim.md
train_split: data/feedback300.jsonl
feedback_split: data/feedback300.jsonl
pareto_split: data/pareto60.jsonl
benchmark_split: data/bench78.jsonl
split_manifest: data/split-manifest.json
metric: row_soft_exact
score_mode: row-soft-exact

score_formula:
  gepa_score: "0.60 * row_jaccard + 0.20 * row_topic_f1 + 0.20 * row_exact"
  frontier_objectives:
    - gepa_score
    - row_jaccard
    - row_topic_f1
    - row_exact

trackio:
  project: easy-v7c-custom-proposer-gepa
  group: v7c-custom-proposer
  step_metric: gepa/iteration
  local_dir: runs/v7c-custom-proposer/trackio

run_defaults:
  run_root: runs/v7c-custom-proposer/gepa
  run_name_template: "{model_slug}-{regime}-soft-exact-{variant}-{feedback_profile}-{candidate_proposer}-mb{reflection_minibatch_size}-mc{max_metric_calls}-{run_index:03d}"
  gepa_mode: row-wise
  feedback_profile: full
  candidate_proposer: openclaw-compact
  reflection_minibatch_size: 20
  frontier_type: hybrid
  candidate_selection_strategy: pareto
  acceptance_criterion: strict_improvement
  max_metric_calls: 1400
  hygiene_penalty: 0.06
  policy_char_budget: 4500
  parallel: 4

models:
  default_task: responses.gpt-5.5?reasoning=high
  default_reflection: codexresponses.gpt-5.5?reasoning=high
  supported:
    - responses.gpt-5.5?reasoning=high
    - codexresponses.gpt-5.4-mini
    - gemma-e4

artifacts:
  regime_doc: docs/V7C_CUSTOM_PROPOSER_REGIME.md
  feedback_sha256: d833344c25bb51a433a28cf18383c96b739417b912fcc89e21b0b0118a37bd13
  pareto_sha256: 39ebd2916328a906c3907317d9e0474dfc04c3e3dca067b544d7977994ee67a2
  bench_sha256: d84af041233e89104d8eba3ad3a6dbb43a47b0fdcbde632a13cbe94c92152f32

notes:
  - Starts from a distilled gold-label generation prompt rather than the sparse v7a seed.
  - Uses alternate mix001 feedback/Pareto split with the same held-out bench78 benchmark.
  - Default feedback profile is full so the custom proposer can compress and generalize rich ASI itself.
  - Uses --candidate-proposer openclaw-compact to test whether constrained custom mutation beats the default proposer.
  - Trackio dashboards should use gepa/iteration as the x-axis.
